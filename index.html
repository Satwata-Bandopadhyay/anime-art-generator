<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Anime AI Art Generator</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --dark: #2d3436;
            --light: #f9f9f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: var(--dark);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            background: white;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
        }

        .button-row {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-enhance { background: #00cec9; color: white; }
        .btn-random { background: #fab1a0; color: white; }
        .btn-generate { 
            background: var(--primary); 
            color: white; 
            width: 100%; 
            font-size: 18px; 
            margin-top: 10px;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:disabled { background: #b2bec3; cursor: not-allowed; }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .output-box {
            margin-top: 30px;
            border: 3px dashed #ddd;
            border-radius: 15px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #fafafa;
            overflow: hidden;
            flex-direction: column;
        }

        #resultImage {
            max-width: 100%;
            max-height: 600px;
            display: none;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .loader-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        #statusText {
            color: var(--primary);
            font-weight: bold;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .action-buttons {
            display: none;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-download { background: #0984e3; color: white; }
        .btn-regenerate { background: #636e72; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Anime Art Studio</h1>
    <p class="subtitle">Generate high-quality anime images using AI</p>

    <div class="input-group">
        <label>Enter your prompt:</label>
        <textarea id="promptInput" placeholder="e.g., A samurai girl in a cyberpunk city..."></textarea>
    </div>

    <div class="button-row">
        <button class="btn-enhance" onclick="enhancePrompt()">✨ Enhance Prompt</button>
        <button class="btn-random" onclick="randomPrompt()">🎲 Random Idea</button>
    </div>

    <div class="settings-grid">
        <div class="input-group">
            <label>Aspect Ratio:</label>
            <select id="aspectRatio">
                <option value="square">Square (1:1)</option>
                <option value="portrait">Portrait (9:16)</option>
                <option value="landscape">Landscape (16:9)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Seed Number:</label>
            <input type="number" id="seedInput" placeholder="Leave empty for random">
        </div>
    </div>

    <button class="btn-generate" id="generateBtn" onclick="startGeneration()">Generate Anime Image</button>

    <div class="output-box">
        <div class="loader-container" id="loaderContainer">
            <div class="loader"></div>
            <p id="statusText">Generating image...</p>
        </div>
        <p id="placeholderText">Your image will appear here</p>
        <img id="resultImage" alt="Generated Art">
    </div>

    <div class="action-buttons" id="actionButtons">
        <button class="btn-download" onclick="downloadImage()">↗️ Open HD & Save</button>
        <button class="btn-regenerate" onclick="startGeneration()">🔄 Regenerate</button>
    </div>
</div>

<script>
    const API_KEY = "sk_xvFFSUyDtPLJzsx2Q8gmjJP1dk1lSRgN";
    
    // Auto-retry variables
    let retryCount = 0;
    const maxRetries = 10;
    let currentUrl = "";

    function enhancePrompt() {
        const input = document.getElementById('promptInput');
        if (input.value.trim() === "") return;
        const enhancements = ", masterpiece, high quality, highly detailed, vibrant colors, aesthetic anime style, 8k resolution, cinematic lighting";
        if (!input.value.includes(enhancements)) {
            input.value += enhancements;
        }
    }

    function randomPrompt() {
        const ideas = [
            "A mysterious girl with glowing blue eyes in a mystical forest, Studio Ghibli style",
            "Cyberpunk street racer with a neon motorcycle, futuristic city background",
            "Cute anime cat chef cooking ramen in a traditional Japanese kitchen",
            "Magical girl with a giant staff standing on a cloud during sunset",
            "Mecha robot fighting a giant dragon in post-apocalyptic Tokyo"
        ];
        document.getElementById('promptInput').value = ideas[Math.floor(Math.random() * ideas.length)];
    }

    function startGeneration() {
        const promptInput = document.getElementById('promptInput').value;
        const ratio = document.getElementById('aspectRatio').value;
        const seedInput = document.getElementById('seedInput').value;
        
        if (!promptInput) {
            alert("Please enter a prompt first!");
            return;
        }

        // Setup size
        let width = 1024, height = 1024;
        if (ratio === "portrait") { width = 720; height = 1280; }
        else if (ratio === "landscape") { width = 1280; height = 720; }

        // Setup seed
        const seed = seedInput || Math.floor(Math.random() * 1000000);

        // UI state changes
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('generateBtn').innerText = "Processing...";
        document.getElementById('loaderContainer').style.display = "flex";
        document.getElementById('statusText').innerText = "Generating image...";
        document.getElementById('resultImage').style.display = "none";
        document.getElementById('placeholderText').style.display = "none";
        document.getElementById('actionButtons').style.display = "none";

        // Final Prompt for Anime style
        const finalPrompt = encodeURIComponent(promptInput + ", high quality anime art style");
        
        // Changed model to 'turbo' as requested
        currentUrl = `https://image.pollinations.ai/prompt/${finalPrompt}?width=${width}&height=${height}&seed=${seed}&model=turbo&nologo=true`;
        
        retryCount = 0;
        attemptLoadImage();
    }

    function attemptLoadImage() {
        const resultImage = document.getElementById('resultImage');
        
        // Cache buster: Adding a timestamp so browser doesn't load a failed cache
        const cacheBusterUrl = `${currentUrl}&cb=${Date.now()}`;
        
        resultImage.src = cacheBusterUrl;

        // Success handler
        resultImage.onload = () => {
            document.getElementById('loaderContainer').style.display = "none";
            resultImage.style.display = "block";
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = false;
            btn.innerText = "Generate Anime Image";
            
            document.getElementById('actionButtons').style.display = "flex";
        };

        // Infinite Loading & Auto-Retry handler
        resultImage.onerror = () => {
            if (retryCount < maxRetries) {
                retryCount++;
                document.getElementById('statusText').innerText = `Server busy. Retrying... (${retryCount}/${maxRetries})`;
                
                // Wait 3 seconds before trying again silently
                setTimeout(attemptLoadImage, 3000);
            } else {
                // If it fails even after 10 retries
                alert("Server is extremely overloaded right now. Please try again later.");
                document.getElementById('loaderContainer').style.display = "none";
                document.getElementById('placeholderText').style.display = "block";
                
                const btn = document.getElementById('generateBtn');
                btn.disabled = false;
                btn.innerText = "Generate Anime Image";
            }
        };
    }

    function downloadImage() {
        const imgUrl = document.getElementById('resultImage').src;
        if (imgUrl) {
            window.open(imgUrl, '_blank');
        }
    }
</script>

</body>
</html>
